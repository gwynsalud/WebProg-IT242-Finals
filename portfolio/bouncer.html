<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tavern Patrol - Arcade</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bouncer.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="arcade-mode">

<div id="app" v-cloak>
    
    <button class="pause-btn" @click="togglePause">
        <span v-if="!isPaused">〓 MENU</span>
        <span v-else>▶ RESUME</span>
    </button>

    <div class="game-container">
        
        <header class="game-header">
            <h1 class="pixel-text glow-yellow">TAVERN PATROL</h1>
            <p class="status-text">Level {{ currentLevel }} • Speed x{{ difficulty.toFixed(1) }}</p>
        </header>

        <div class="game-hud">
            <div class="hud-box">
                <div class="hud-label">SCORE</div>
                <div class="hud-value">{{ gameScore }}</div>
                <div class="progress-mini">
                    <div class="progress-fill" :style="{ width: (gameScore % 100) + '%' }"></div>
                </div>
            </div>
            
            <div class="hud-box">
                <div class="hud-label">VITALITY</div>
                <div class="d-flex gap-2 justify-content-center mt-1">
                    <span v-for="n in 3" :key="n" class="heart-unit" :class="{ 'lost': n > gameLives }">❤️</span>
                </div>
            </div>
        </div>

        <main id="game-stage">
            <div class="scanlines"></div>
            
            <div 
                v-for="npc in activeNPCs" 
                :key="npc.id" 
                class="npc-character"
                :class="npc.type"
                :style="{ left: npc.x + 'px', top: npc.y + 'px' }"
                @mousedown.prevent="bonk(npc)"
            >
                {{ npc.icon }}
            </div>

            <transition name="fade">
                <div v-if="!gameActive" class="game-overlay">
                    <div class="overlay-card">
                        <h2 v-if="gameLives <= 0" class="text-danger pulse">SHIFT FAILED</h2>
                        <h2 v-else>READY?</h2>
                        
                        <div class="instruction-box my-4">
                            <p>BONK Sleepers <span class="badge bg-danger">💤</span></p>
                            <p>LEAVE Coffee <span class="badge bg-success">☕</span></p>
                        </div>
                        
                        <button class="pixel-btn-yellow" @click="startBouncerGame">
                            {{ gameLives <= 0 ? 'RETRY' : 'START' }}
                        </button>
                    </div>
                </div>
            </transition>

            <transition name="pop">
                <div v-if="showLevelUp" class="level-up-banner">
                    LEVEL {{ currentLevel }}
                </div>
            </transition>
        </main>

        <footer class="game-footer">
            <a href="profile.html" class="pixel-link">← EXIT TO CHARACTER SHEET</a>
        </footer>
    </div>

    <transition name="fade">
        <div v-if="isPaused" class="pause-overlay" @click.self="togglePause">
            <div class="menu-content text-center">
                <h2 class="menu-title">- PAUSED -</h2>
                <nav class="menu-links">
                    <a href="index.html">MAIN LOBBY</a>
                    <a href="profile.html">CHARACTER SHEET</a>
                    <hr class="opacity-25 my-3">
                    <a href="#" @click.prevent="togglePause" class="text-warning">RESUME</a>
                </nav>
            </div>
        </div>
    </transition>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/bouncer.js"></script>

</body>
</html>
