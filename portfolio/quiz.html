<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scholar's Trial</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="quiz-app">
        <nav class="tavern-nav">
            <a href="index.html">📜 Tavern Ledger</a>
            <a href="bouncer.html">⚔️ Tavern Patrol</a>
        </nav>

        <main class="quest-container">
            <div class="sprite-wrapper">
                <span class="animate-bounce">🧙‍♂️</span>
            </div>

            <div v-if="!completed" class="pixel-box">
                <div class="step-indicator">LVL {{ currentStep + 1 }}</div>
                
                <p class="riddle-text">
                    SCHOLAR: "{{ questions[currentStep].text }}"
                </p>
                
                <input type="text" 
                    v-model="userAnswer" 
                    class="pixel-input"
                    @keyup.enter="checkAnswer" 
                    placeholder="INPUT ANSWER..."
                    autofocus>
                
                <div style="text-align: right;">
                    <button class="pixel-btn" @click="checkAnswer">CONFIRM ></button>
                </div>
            </div>

            <div v-else class="pixel-box">
                <h2 style="color: var(--pixel-accent); font-size: 14px;">QUEST COMPLETE!</h2>
                <p class="riddle-text">YOU HAVE OBTAINED THE SCHOLAR'S KEY.</p>
                <a href="index.html" class="pixel-btn" style="text-decoration: none; display: inline-block;">GO BACK</a>
            </div>
        </main>
    </div>

    <script src="js/quiz.js"></script>
</body>
</html>
