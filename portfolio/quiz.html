<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scholar's Trial</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="quiz-app">
        <nav class="tavern-nav">
            <a href="index.html">📜 Tavern Ledger</a>
            <a href="bouncer.html">⚔️ Tavern Patrol</a>
        </nav>

        <main class="quest-container">
            <div class="scholar-aura">
                <div class="scholar-icon">🧙‍♂️</div>
                <div class="magic-circle"></div>
            </div>

            <h1 class="ancient-title">{{ title }}</h1>

            <div v-if="!completed" class="riddle-scroll">
                <div class="scroll-top"></div>
                
                <div class="scroll-content">
                    <span class="step-counter">— Step {{ currentStep + 1 }} —</span>
                    <p class="riddle-text">"{{ questions[currentStep].text }}"</p>
                    
                    <div class="input-wrapper">
                        <input type="text" 
                            v-model="userAnswer" 
                            @keyup.enter="checkAnswer" 
                            placeholder="Whisper the answer..."
                            autofocus>
                        <div class="input-glow"></div>
                    </div>
                    
                    <button class="cast-btn" @click="checkAnswer">Cast Spell</button>
                </div>

                <div class="scroll-bottom"></div>
            </div>

            <div v-else class="riddle-scroll success-scroll animate-glow">
                <div class="scroll-content">
                    <h2 class="success-title">Knowledge Unlocked</h2>
                    <p>The Scholar fades into mist, leaving behind the key to his deck.</p>
                    <a href="index.html" class="cast-btn">Enter the Secret Deck</a>
                </div>
            </div>
        </main>
    </div>

    <script src="js/quiz.js"></script>
</body>
</html>
