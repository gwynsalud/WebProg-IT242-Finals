<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guild Ledger | Gwen's Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    /* Integrated Loading Styles */
    .ledger-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #ffc107;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.7rem;
      text-align: center;
    }
    .pixel-dots { display: flex; gap: 12px; margin-bottom: 25px; }
    .dot {
      width: 15px; height: 15px; background: #ffc107;
      box-shadow: 3px 3px 0px #8b4513;
      animation: jump 0.6s infinite alternate;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes jump { from { transform: translateY(0); } to { transform: translateY(-20px); } }

    #guestbook {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .terminal-window, .ledger-box {
      height: 72vh; 
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .visitor-list {
      flex: 1;
      overflow-y: auto !important;
    }

    .avatar-preview-box {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pixel-avatar-md {
      width: 48px;
      height: 48px;
      image-rendering: pixelated;
    }
  </style>
</head>

<body>
  <div id="app" v-cloak>
    <button class="pause-btn" v-on:click="togglePause">
      <span v-if="!isPaused">〓 MENU</span>
      <span v-else>▶ RESUME</span>
    </button>

    <transition name="fade">
      <div v-if="isPaused" class="pause-overlay" @click.self="togglePause">
        <div class="pixel-box menu-content text-center">
          <h2 class="menu-title mb-5">- GAME PAUSED -</h2>
          <nav class="menu-links">
            <a href="index.html" class="menu-item">START MENU</a>
            <a href="index.html#characters" class="menu-item">CHARACTER SELECTION</a>
            <a href="profile.html" class="menu-item">TRAINING GROUNDS</a>
            <a href="quests.html" class="menu-item">QUEST LOG</a>
            <a href="guild.html" class="menu-item">GUILD LEDGER</a>
            <a href="resources.html" class="menu-item">THE SCHOLAR's DECK</a>
          </nav>
        </div>
      </div>
    </transition>

    <section id="guestbook" class="bg-black text-white">
      <div class="container py-3 flex-grow-1">
        <h2 class="rpg-title text-center mb-4">GUILD SIGN-IN SHEET</h2>

        <div class="row justify-content-center g-4">
          <div class="col-md-6">
            <div class="terminal-window border-pixel">
              <div class="window-top p-2">NEW ENTRY: SIGN THE LEDGER</div>
              <form @submit.prevent="addEntry" class="p-3 d-flex flex-column h-100">

                <div class="d-flex align-items-center mb-2 gap-3 p-2 bg-dark border-pixel">
                  <div class="avatar-preview-box border-pixel">
                    <img :src="selectedAvatar" alt="Preview" class="pixel-avatar-md">
                  </div>
                  <div>
                    <label class="quest-label d-block">CHOSEN CLASS</label>
                    <span class="text-warning font-press-start" style="font-size: 0.8rem;">{{ selectedClass.toUpperCase() }}</span>
                  </div>
                </div>

                <div class="mb-2">
                  <label class="form-label quest-label">TRAVELER NAME</label>
                  <input v-model="newName" type="text" class="rpg-input w-100" placeholder="Enter Hero Name..." required>
                </div>

                <div class="mb-2">
                  <label class="form-label quest-label">SELECT YOUR CLASS</label>
                  <div class="d-flex flex-wrap gap-2 mt-1">
                    <button v-for="job in classes" :key="job.name" type="button" class="pixel-tab-sm"
                      :class="{ 'active-tab': selectedClass === job.name }" @click="selectClass(job)">
                      {{ job.icon }} {{ job.name }}
                    </button>
                  </div>
                </div>

                <div class="mb-3 flex-grow-1">
                  <label class="form-label quest-label">MESSAGE</label>
                  <textarea v-model="newMessage" class="rpg-input w-100 h-100" style="min-height: 60px;" placeholder="Leave a word..." required></textarea>
                </div>

                <button type="submit" class="rpg-btn-gold w-100" :disabled="submitted" style="flex-shrink: 0; margin-top: auto;">
                  <span v-if="!submitted">SIGN LEDGER</span>
                  <span v-else>✔ QUEST COMPLETE!</span>
                </button>
              </form>
            </div>
          </div>

          <div class="col-md-5">
            <div class="ledger-box border-pixel">
              <h3 class="stat-header p-3 mb-0 text-center" style="font-size: 0.8rem;">RECENT VISITORS</h3>
              
              <div class="visitor-list custom-scrollbar p-3">
                <div v-if="isLoading" class="ledger-loader">
                  <div class="pixel-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                  <p>CONSULTING THE ANCIENT SCROLLS...</p>
                </div>

                <template v-else>
                  <div v-for="(entry, index) in entries" :key="index" class="visitor-card mb-3 p-2"
                    :class="'border-class-' + (entry.desired_class || 'novice').toLowerCase()">
                    <div class="d-flex gap-3">
                      <img :src="entry.avatar_url" class="pixel-avatar-sm" alt="Icon" style="width:32px; height:32px; image-rendering:pixelated;">
                      <div class="w-100">
                        <div class="d-flex justify-content-between align-items-center">
                          <span class="visitor-name text-warning">> {{ entry.name }}</span>
                          <span class="visitor-class-tag" style="font-size: 0.5rem;">{{ entry.desired_class }}</span>
                        </div>
                        <p class="visitor-msg mt-1 mb-1">"{{ entry.message }}"</p>
                        <div class="text-end">
                          <span class="visitor-date text-secondary">{{ formatDate(entry.created_at) }}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  
</body>
</html>
